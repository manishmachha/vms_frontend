name: Feature Branch UI Preview Deploy

on:
  push:
    branches: ["feature/*"]

env:
  AWS_REGION: eu-north-1
  EC2_USER: ubuntu

jobs:
  build-and-deploy:
    name: Build & Auto-Deploy UI Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Branch Name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/feature/}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Feature Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/vms-frontend:feature-${{ steps.branch.outputs.name }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trigger Deployment via Backend API
        run: |
          curl -X POST "https://solventek.com/api/admin/devops/deploy" \
          -H "Authorization: Bearer ${{ secrets.ADMIN_JWT_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "branchName": "feature/${{ steps.branch.outputs.name }}",
            "imageTag": "feature-${{ steps.branch.outputs.name }}"
          }'
