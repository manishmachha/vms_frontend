name: Deploy VMS Frontend

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  EC2_USER: ubuntu
  DEPLOY_DIR: /home/ubuntu/solventek-vms-ui

jobs:
  build:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/vms-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/vms-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy via SSH
        env:
          ECR_REGISTRY: ${{ needs.build.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          ssh -o StrictHostKeyChecking=no ${EC2_USER}@${{ secrets.EC2_HOST }} "mkdir -p $DEPLOY_DIR"
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" docker-compose.prod.yml ${EC2_USER}@${{ secrets.EC2_HOST }}:$DEPLOY_DIR/
          ssh -o StrictHostKeyChecking=no ${EC2_USER}@${{ secrets.EC2_HOST }} "
            export DOCKER_REGISTRY=$ECR_REGISTRY
            export IMAGE_TAG=$IMAGE_TAG
            export DOCKER_USERNAME=AWS
            export DOCKER_PASSWORD=$ECR_PASSWORD
            
            # Login to ECR
            echo \$DOCKER_PASSWORD | docker login \$DOCKER_REGISTRY -u \$DOCKER_USERNAME --password-stdin
            
            # Create network if not exists
            docker network create solventek-network || true
            
            cd $DEPLOY_DIR
            
            # Pull and Update
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            
            # Cleanup old images
            docker image prune -f
          "
