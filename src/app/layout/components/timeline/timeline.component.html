<div class="space-y-8 relative pl-4 my-4">
  <!-- Connectivity Line -->
  <div class="absolute top-0 bottom-0 left-[27px] w-px bg-gray-200"></div>

  <div *ngFor="let event of events" class="relative z-10">
    <div class="flex items-start gap-4">
      <!-- Icon Container -->
      <div
        class="h-10 w-10 rounded-full border-4 border-gray-50 flex items-center justify-center shadow-sm shrink-0"
        [ngClass]="getEventColor(event.action)"
      >
        <mat-icon class="text-[18px] w-[18px] h-[18px] leading-none text-white!">
          {{ getEventIcon(event.action) }}
        </mat-icon>
      </div>

      <!-- Content Card -->
      <div class="flex-1 bg-white p-4 rounded-xl border border-gray-200 shadow-sm relative arrow-left hover:border-indigo-200 transition-colors">
        <div class="flex justify-between items-start mb-1">
          <span class="font-bold text-gray-900 text-sm">
            {{ event.action?.replace('_', ' ') | titlecase }}
          </span>
          <span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">
            {{ event.createdAt | date: 'MMM d, h:mm a' }}
          </span>
        </div>
        <p class="text-sm text-gray-600 leading-relaxed">{{ event.description }}</p>
        
        <!-- Metadata/Note (Optional) -->
        <div *ngIf="event.metadata" class="mt-2 text-xs text-indigo-500 bg-indigo-50 px-2 py-1 rounded border border-indigo-100/50 italic">
          {{ event.metadata }}
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!events || events.length === 0" class="flex flex-col items-center justify-center py-12 bg-white rounded-2xl border border-dashed border-gray-200">
    <mat-icon class="text-4xl text-gray-200 mb-2">history</mat-icon>
    <p class="text-gray-400 font-medium text-sm italic">No history found for this record</p>
  </div>
</div>
