<div class="p-6 max-h-[90vh] overflow-y-auto">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-indigo-100 rounded-lg shadow-sm">
        <mat-icon class="text-indigo-600!">{{ data.editProject ? 'edit' : 'add_chart' }}</mat-icon>
      </div>
      <h3 class="text-xl font-bold text-gray-900 tracking-tight">{{ data.editProject ? 'Edit Project' : 'Create New Project' }}</h3>
    </div>
    <button mat-icon-button (click)="onClose()" class="text-gray-400 hover:text-gray-600 transition-colors">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="projectForm" (ngSubmit)="saveProject()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="col-span-1 md:col-span-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Project Name</label>
        <input
          formControlName="name"
          placeholder="e.g., Cloud Migration Phase 1"
          class="input-modern bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
        />
      </div>

      <div class="col-span-1 md:col-span-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Client (Optional)</label>
        <select
          formControlName="clientId"
          class="input-modern bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
        >
          <option [value]="null">-- Internal Project --</option>
          <option *ngFor="let client of data.clients" [value]="client.id">
            {{ client.name }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Start Date</label>
        <div class="relative group">
          <input
            type="date"
            formControlName="startDate"
            class="input-modern pl-12 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">End Date</label>
        <div class="relative group">
          <input
            type="date"
            formControlName="endDate"
            class="input-modern pl-12 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Bill Rate ($/hr)</label>
        <div class="relative group">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold group-focus-within:text-indigo-600 transition-colors">$</span>
          <input
            type="number"
            formControlName="billRate"
            placeholder="0.00"
            class="input-modern pl-8 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Pay Rate ($/hr)</label>
        <div class="relative group">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold group-focus-within:text-indigo-600 transition-colors">$</span>
          <input
            type="number"
            formControlName="payRate"
            placeholder="0.00"
            class="input-modern pl-8 bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
          />
        </div>
      </div>

      <div class="col-span-1 md:col-span-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Request ID / Internal Ref</label>
        <input
          formControlName="requestId"
          placeholder="Client's internal request number..."
          class="input-modern bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10"
        />
      </div>

      <div class="col-span-1 md:col-span-2">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Detailed Description</label>
        <textarea
          formControlName="description"
          rows="3"
          placeholder="Describe project goals, outcomes, and scope..."
          class="input-modern bg-gray-50/50 border-gray-100 hover:border-indigo-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 py-3 resize-none"
        ></textarea>
      </div>
    </div>

    <div class="pt-6 flex justify-end gap-3 border-t border-gray-50">
      <button
        type="button"
        (click)="onClose()"
        class="px-6 py-2.5 rounded-xl border border-gray-200 text-gray-700 hover:bg-gray-50 font-semibold transition-all"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="projectForm.invalid"
        class="px-8 py-2.5 bg-linear-to-r from-indigo-600 to-indigo-700 text-white rounded-xl hover:from-indigo-700 hover:to-indigo-800 font-bold transition-all shadow-lg shadow-indigo-200 disabled:opacity-50"
      >
        {{ data.editProject ? 'Update Project' : 'Create Project' }}
      </button>
    </div>
  </form>
</div>
